name: Daily Case Study

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  send-case-study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore sent history
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: sent_history.json
          key: sent-history-${{ github.run_id }}
          restore-keys: sent-history-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send case study
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_case_study.py
      - name: Save sent history
        uses: actions/cache@v4
        with:
          path: sent_history.json
          key: sent-history-${{ github.run_id }}
